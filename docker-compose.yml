name: flink-demo

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.2
    container_name: flink-demo-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr=PLAINTEXT://0.0.0.0:8082
      - --advertise-pandaproxy-addr=PLAINTEXT://redpanda:8082
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "19092:19092"
      - "18082:8082"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - demo-net

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.8.2
    container_name: flink-demo-redpanda-console
    environment:
      KAFKA_BROKERS: redpanda:9092
      REDPANDA_ADMINAPI_ENABLED: "false"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - demo-net

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: flink-demo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
      - ./state:/workspace/state
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/minio/health/live >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - demo-net

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: flink-demo-minio-init
    restart: "no"
    environment:
      MINIO_ALIAS: local
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      CHECKPOINTS_BUCKET: flink-checkpoints
      SAVEPOINTS_BUCKET: flink-savepoints
      WAREHOUSE_BUCKET: flink-warehouse
    volumes:
      - ./infra/minio/init/create-buckets.sh:/create-buckets.sh:ro
    entrypoint: ["/bin/sh", "-c", "sleep 5; /bin/sh /create-buckets.sh"]
    networks:
      - demo-net

  jobmanager:
    image: flink:1.20.1-scala_2.12-java17
    container_name: flink-demo-jobmanager
    command: jobmanager
    ports:
      - "8082:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1600m
        rest.address: jobmanager
        rest.bind-address: 0.0.0.0
        rest.port: 8081
        parallelism.default: 2
        taskmanager.numberOfTaskSlots: 2
        state.checkpoints.dir: s3://flink-checkpoints/checkpoints
        state.savepoints.dir: s3://flink-savepoints/savepoints
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minio
        s3.secret-key: minio123
        s3.connection.ssl.enabled: false
    volumes:
      - ./infra/flink/conf/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml
      - ./infra/flink/lib/flink-sql-connector-kafka-3.4.0-1.20.jar:/opt/flink/lib/flink-sql-connector-kafka-3.4.0-1.20.jar:ro
      - ./infra/flink/lib/flink-s3-fs-hadoop-1.20.1.jar:/opt/flink/lib/flink-s3-fs-hadoop-1.20.1.jar:ro
      - ./jobs:/workspace/jobs
      - ./state:/workspace/state
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/overview >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s
    networks:
      - demo-net

  taskmanager:
    image: flink:1.20.1-scala_2.12-java17
    container_name: flink-demo-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        parallelism.default: 2
        taskmanager.numberOfTaskSlots: 2
        taskmanager.memory.process.size: 1728m
        state.checkpoints.dir: s3://flink-checkpoints/checkpoints
        state.savepoints.dir: s3://flink-savepoints/savepoints
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minio
        s3.secret-key: minio123
        s3.connection.ssl.enabled: false
    volumes:
      - ./infra/flink/conf/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml
      - ./infra/flink/lib/flink-sql-connector-kafka-3.4.0-1.20.jar:/opt/flink/lib/flink-sql-connector-kafka-3.4.0-1.20.jar:ro
      - ./infra/flink/lib/flink-s3-fs-hadoop-1.20.1.jar:/opt/flink/lib/flink-s3-fs-hadoop-1.20.1.jar:ro
      - ./jobs:/workspace/jobs
      - ./state:/workspace/state
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[T]askManagerRunner' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - demo-net

  sql-client:
    image: flink:1.20.1-scala_2.12-java17
    container_name: flink-demo-sql-client
    entrypoint: ["/bin/sh", "-c", "sleep infinity"]
    tty: true
    stdin_open: true
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        rest.address: jobmanager
        rest.port: 8081
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minio
        s3.secret-key: minio123
        s3.connection.ssl.enabled: false
    volumes:
      - ./infra/flink/conf/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./infra/flink/conf/sql-client-defaults.yaml:/opt/flink/conf/sql-client-defaults.yaml:ro
      - ./infra/flink/lib/flink-sql-connector-kafka-3.4.0-1.20.jar:/opt/flink/lib/flink-sql-connector-kafka-3.4.0-1.20.jar:ro
      - ./infra/flink/lib/flink-s3-fs-hadoop-1.20.1.jar:/opt/flink/lib/flink-s3-fs-hadoop-1.20.1.jar:ro
      - ./jobs:/workspace/jobs
      - ./scripts:/workspace/scripts
    healthcheck:
      test: ["CMD-SHELL", "sleep 1; exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - demo-net

  producer:
    build:
      context: ./producers/python
      dockerfile: Dockerfile
    container_name: flink-demo-producer
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      TOPIC: orders_raw
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./producers/python/src:/app/src
      - ./producers/sample-data:/app/sample-data
    command: ["python", "/app/src/produce_orders.py"]
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[p]ython /app/src/produce_orders.py' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - demo-net

networks:
  demo-net:
    driver: bridge

volumes:
  redpanda-data:
  minio-data: